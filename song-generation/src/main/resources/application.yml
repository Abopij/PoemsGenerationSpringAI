spring:
  application:
    name: spring-ai-songs-generation


ace-step:
  base-url: ${ACE_MUSIC_BASE_URL:https://api.acemusic.ai}
  api-key: ${ACE_MUSIC_API_KEY:}
  model: ${ACE_MUSIC_MODEL:acemusic/acestep-v1.5-turbo}
  timeout-seconds: 600
  defaults:
    task-type: text2music
    audio-format: mp3
    vocal-language: en
    temperature: 0.85
    top-p: 0.9
    sample-mode: false
    thinking: false
    use-format: false
    use-cot-caption: true
    use-cot-language: true
    guidance-scale: 7.0
    batch-size: 1


minio:
  url: http://localhost:9000
  access:
    name: admin
    secret: adminpassword


springdoc:
  swagger-ui:
    path: "/docs"


server:
  port: 8082
