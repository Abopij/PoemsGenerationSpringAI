spring:
  application:
    name: spring-ai-songs-generation

  grpc:
    server:
      port: 9092

  datasource:
    url: jdbc:postgresql://localhost:5432/ai
    username: abopij
    password: hard-password
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect


ace-step:
  base-url: ${ACE_MUSIC_BASE_URL:https://api.acemusic.ai}
  api-key: ${ACE_MUSIC_API_KEY:}
  model: ${ACE_MUSIC_MODEL:acemusic/acestep-v1.5-turbo}
  timeout-seconds: 1000
  defaults:
    task-type: text2music
    audio-format: mp3
    vocal-language: en
    temperature: 0.85
    top-p: 0.9
    sample-mode: false
    thinking: false
    use-format: false
    use-cot-caption: true
    use-cot-language: true
    guidance-scale: 7.0
    batch-size: 1


minio:
  url: http://localhost:9000
  access:
    name: admin
    secret: adminpassword


springdoc:
  swagger-ui:
    path: "/docs"


server:
  port: 8082
