syntax = "proto3";

option java_package = "com.baeldung.helloworld.stubs";
option java_multiple_files = true;

message SongGenerationRequest {
  string poem = 1;
  string styles = 2;
}

message SongGenerationResponse {
  string link = 1;
}

service GenerationSongGrpcController {
  rpc generate(stream SongGenerationRequest) returns (stream SongGenerationResponse);
}